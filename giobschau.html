async function loadPatientsJson() {
    try {
	const accessToken = await getDropboxAccessToken();

function normalizePatientName(name) {
    return String(name || "")
        .normalize("NFC")
        .replace(/[\r\n\t]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
}

function buildLatestPatientMap() {
    patientLatestMap.clear();

    patientsData.forEach(patient => {

        const name = normalizePatientName(patient.fullName);

        if (!name) return;

        const admissionDate = new Date(patient.admissionDate || '1900-01-01');

        if (!patientLatestMap.has(name)) {
            patientLatestMap.set(name, patient);
            return;
        }

        const current = patientLatestMap.get(name);
        const currentAdmission = new Date(current.admissionDate || '1900-01-01');

        if (admissionDate > currentAdmission) {
            patientLatestMap.set(name, patient);
        }
    });
}

function updatePatientNameColors() {

    const today = new Date();
    today.setHours(0,0,0,0);

    document.querySelectorAll('#tableBody tr').forEach(tr => {

        const nameCell = tr.children[1];
        if (!nameCell) return;

        const name = normalizePatientName(nameCell.textContent);

        nameCell.style.color = '';
        nameCell.style.fontWeight = '';

        if (!name) return;

        const patient = patientLatestMap.get(name);

        // Không có trong patients.json => xanh
        if (!patient) {
            nameCell.style.color = '#008000';
            nameCell.style.fontWeight = 'bold';
            return;
        }

        const dischargeDate = new Date(patient.dischargeDate);

        // dischargeDate > hôm nay => đỏ
        if (dischargeDate < today) {
            nameCell.style.color = '#d60000';
            nameCell.style.fontWeight = 'bold';
        }
    });
}

    function initScheduleData() {
        scheduleData = rawRowsData.map((row, idx) => ({
            id: idx,
            patientName: "",
            dienCham: row.dienCham,
            may: row.may,
            chieuDen: row.chieuDen,
            den: row.den,
            xoaBop: row.xoaBop,
            thuyCham: null
        }));
    }
    initScheduleData();

    const TIME_SLOTS = [
        "11h03-11h28", "13h30-13h55", "13h41-14h06", "13h52-14h17",
        "14h03-14h28", "14h14-14h39", "14h25-14h50", "14h36-15h01", "14h47-15h12"
    ];

function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        scheduleData.forEach((row, idx) => {
            const tr = document.createElement('tr');
            
            // --- Thêm cột STT (với tính năng click để dán) ---
            const tdSTT = document.createElement('td');
            tdSTT.innerText = idx + 1;
            tdSTT.style.textAlign = 'center';
            tdSTT.style.cursor = 'pointer';
            tdSTT.style.backgroundColor = '#f8fafc';
            tdSTT.title = "Click để dán tên bệnh nhân đã chọn";
            
            tdSTT.onclick = () => {
                if (typeof pendingPatientName !== 'undefined' && pendingPatientName) {
                    scheduleData[idx].patientName = pendingPatientName;
                    renderTable(); // Vẽ lại bảng để cập nhật tên
                    showToast(`Đã dán: ${pendingPatientName} vào dòng ${idx + 1}`, "success");
                    pendingPatientName = ""; // Reset sau khi dán
                } else {
                    showToast("Vui lòng chọn tên bệnh nhân từ danh sách trước!", "warning");
                }
            };
            tr.appendChild(tdSTT);
            // --------------------
            
            const tdName = document.createElement('td');
            tdName.setAttribute('contenteditable', 'true');
            tdName.classList.add('editable-name');
            tdName.innerText = row.patientName;

            tdName.addEventListener('blur', (e) => {
                scheduleData[idx].patientName = e.target.innerText.trim();
                updatePatientNameColors();
            });

            const tdDienCham = createTd(row.dienCham);
            const tdMay = createTd(row.may);
            const tdChieuDen = createTd(row.chieuDen);
            const tdDen = createTd(row.den);
            const tdXoaBop = createTd(row.xoaBop);
            
            const tdThuyCham = document.createElement('td');
            tdThuyCham.classList.add('thuy-cham-cell');
            let thuyText = "";
            if (row.thuyCham) {
                thuyText = `${row.thuyCham.dayType} | ${row.thuyCham.timeSlot}`;
            } else {
                thuyText = "➕ Chọn lịch";
                tdThuyCham.style.fontStyle = "italic";
            }
            tdThuyCham.innerText = thuyText;
            tdThuyCham.addEventListener('click', (e) => {
                e.stopPropagation();
                openModalForRow(idx);
            });

            tr.appendChild(tdName);
            tr.appendChild(tdDienCham);
            tr.appendChild(tdMay);
            tr.appendChild(tdChieuDen);
            tr.appendChild(tdDen);
            tr.appendChild(tdXoaBop);
            tr.appendChild(tdThuyCham);
            tbody.appendChild(tr);
        });

        setTimeout(updatePatientNameColors, 50);
    }

    function createTd(content) { const td = document.createElement('td'); td.innerText = content; return td; }

    // Modal logic
    let currentRowIndex = null;
    const modal = document.getElementById('thuyChamModal');
    const dayTypeSelect = document.getElementById('dayTypeSelect');
    const timeSlotContainer = document.getElementById('timeSlotContainer');
    const modalPatientNameSpan = document.getElementById('modalPatientName');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const confirmModalBtn = document.getElementById('confirmModalBtn');
    const deleteModalBtn = document.getElementById('deleteModalBtn');
    let selectedTimeSlot = null;

    function openModalForRow(rowIdx) {
        currentRowIndex = rowIdx;
        const patient = scheduleData[rowIdx].patientName || "(chưa có tên)";
        modalPatientNameSpan.innerText = patient;
        deleteModalBtn.style.display = scheduleData[rowIdx].thuyCham ? 'block' : 'none';
        dayTypeSelect.value = scheduleData[rowIdx].thuyCham ? scheduleData[rowIdx].thuyCham.dayType : "2-4-6";
        selectedTimeSlot = scheduleData[rowIdx].thuyCham ? scheduleData[rowIdx].thuyCham.timeSlot : null;
        renderTimeSlots();
        modal.classList.add('active');
    }

    function renderTimeSlots() {
        const dayType = dayTypeSelect.value;
        if (!dayType) return;
        let occupiedSlots = [];
        scheduleData.forEach((item, idx) => {
            if (idx !== currentRowIndex && item.thuyCham && item.thuyCham.dayType === dayType) {
                occupiedSlots.push(item.thuyCham.timeSlot);
            }
        });
        const grid = document.createElement('div');
        grid.className = 'time-grid';
        TIME_SLOTS.forEach(slot => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'time-option';
            if (occupiedSlots.includes(slot)) {
                slotDiv.classList.add('disabled');
                slotDiv.innerText = slot + " (đã đặt)";
            } else {
                slotDiv.innerText = slot;
                if (selectedTimeSlot === slot) slotDiv.classList.add('selected');
                slotDiv.addEventListener('click', (e) => {
                    if (slotDiv.classList.contains('disabled')) {
                        showToast("Khung giờ này đã có người đặt, vui lòng chọn khác.", "warning");
                        return;
                    }
                    document.querySelectorAll('#timeSlotContainer .time-option').forEach(el => el.classList.remove('selected'));
                    slotDiv.classList.add('selected');
                    selectedTimeSlot = slot;
                });
            }
            grid.appendChild(slotDiv);
        });
        timeSlotContainer.innerHTML = '';
        timeSlotContainer.appendChild(grid);
    }

    dayTypeSelect.addEventListener('change', () => {
        selectedTimeSlot = null;
        renderTimeSlots();
    });

    function closeModal() { modal.classList.remove('active'); currentRowIndex = null; selectedTimeSlot = null; }
    
    confirmModalBtn.addEventListener('click', () => {
        if (currentRowIndex === null) return;
        const dayType = dayTypeSelect.value;
        if (!dayType) { showToast("Vui lòng chọn loại ngày (Thứ 2-4-6 hoặc 3-5)", "warning"); return; }
        if (!selectedTimeSlot) { showToast("Vui lòng chọn khung giờ cho thủy châm", "warning"); return; }
        // Kiểm tra xung đột toàn bộ
        const conflict = scheduleData.some((item, idx) => idx !== currentRowIndex && item.thuyCham && item.thuyCham.dayType === dayType && item.thuyCham.timeSlot === selectedTimeSlot);
        if (conflict) { showToast("Khung giờ này đã được đặt bởi bệnh nhân khác, không thể chọn.", "error"); return; }
        scheduleData[currentRowIndex].thuyCham = { dayType: dayType, timeSlot: selectedTimeSlot };
        renderTable();
        showToast(`Đã đặt lịch thủy châm cho ${scheduleData[currentRowIndex].patientName || "bệnh nhân"} thành công!`, "success");
        closeModal();
    });

    deleteModalBtn.addEventListener('click', () => {
        if (currentRowIndex === null) return;
        if (scheduleData[currentRowIndex].thuyCham) {
            scheduleData[currentRowIndex].thuyCham = null;
            renderTable();
            showToast("Đã xóa lịch thủy châm thành công.", "success");
            closeModal();
        } else {
            showToast("Không có lịch để xóa.", "warning");
            closeModal();
        }
    });

    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // Dropbox lưu & tải (thay alert bằng toast)
    async function saveToDropbox() {
        try {
            const accessToken = await getDropboxAccessToken();
            const dataToSave = { schedule: scheduleData, lastUpdated: new Date().toISOString() };
            const jsonStr = JSON.stringify(dataToSave, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const fileData = await blob.arrayBuffer();
            const response = await fetch("https://content.dropboxapi.com/2/files/upload", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${accessToken}`,
                    "Content-Type": "application/octet-stream",
                    "Dropbox-API-Arg": JSON.stringify({ path: DROPBOX_PATH, mode: "overwrite", autorename: false, mute: false })
                },
                body: fileData
            });
            if (!response.ok) throw new Error(`Upload lỗi ${response.status}`);
            showToast("💾 Lưu dữ liệu thành công!", "success");
        } catch (err) {
            console.error(err);
            showToast("Lưu thất bại: " + err.message, "error");
        }
    }

async function loadFromDropbox() {
    const loader = document.getElementById('loadingModal');
    loader.style.display = 'flex'; // Hiển thị popup

    try {
        const accessToken = await getDropboxAccessToken();
        const response = await fetch("https://content.dropboxapi.com/2/files/download", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${accessToken}`,
                "Dropbox-API-Arg": JSON.stringify({ path: DROPBOX_PATH })
            }
        });

        if (response.status === 409) {
            showToast("Chưa có file lưu trữ.", "warning");
            return;
        }
        if (!response.ok) throw new Error("Tải file lỗi");
        
        const fileJson = await response.json();
        if (fileJson && fileJson.schedule) {
            scheduleData = fileJson.schedule;
            renderTable();
            loadPatientsJson();
            showToast("📥 Đã tải thành công!", "success");
        }
    } catch (err) {
        console.warn(err);
        showToast("Lỗi khi tải dữ liệu", "error");
    } finally {
        loader.style.display = 'none'; // Ẩn popup khi xong
    }
}



document.getElementById('listPatientBtn').addEventListener('click', () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const scheduledNames = new Set(
        scheduleData.map(item => normalizePatientName(item.patientName)).filter(name => name !== "")
    );

    const pendingPatients = patientsData.filter(p => {
        const name = normalizePatientName(p.fullName);
        const discharge = new Date(p.dischargeDate);
        return discharge >= today && !scheduledNames.has(name);
    });

    const tbody = document.getElementById('patientListBody');
    const tableEl = tbody.parentElement;
    const headerRow = tableEl.querySelector('thead');
    
    tbody.innerHTML = '';
    
    if (pendingPatients.length === 0) {
        headerRow.style.display = 'none';
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 20px; color: #067647; font-weight: bold;">✅ Đã cập nhập tất cả bệnh nhân!</td></tr>`;
    } else {
        headerRow.style.display = 'table-header-group';
        pendingPatients.forEach((p, idx) => {
            const admission = new Date(p.admissionDate);
            const discharge = new Date(p.dischargeDate);
            const days = Math.floor((discharge - admission) / (1000 * 60 * 60 * 24)) + 1;

            const tr = document.createElement('tr');
            // Cấu trúc cột tên có thêm sự kiện click để copy
            tr.innerHTML = `
                <td style="text-align:center">${idx + 1}</td>
                <td style="padding: 8px; cursor: pointer; color: #2c6e9e; font-weight: bold;" title="Click để chọn tên này">
                    ${p.fullName}
                </td>
                <td style="text-align:center">${p.age}</td>
                <td style="text-align:center">${p.room}</td>
                <td>${p.patientType}</td>
                <td>${formatDate(p.admissionDate)}</td>
                <td>${formatDate(p.dischargeDate)}</td>
                <td style="text-align:center; font-weight:bold">${days}</td>
            `;
            
            // Xử lý click copy tên
            tr.querySelector('td:nth-child(2)').onclick = () => {
                pendingPatientName = p.fullName;
                showToast(`Đã chọn: ${p.fullName}. Hãy click vào số STT để dán!`, "success");
                document.getElementById('patientListModal').classList.remove('active');
            };
            
            tbody.appendChild(tr);
        });
    }
    document.getElementById('patientListModal').classList.add('active');
});


// Sửa lại sự kiện nút Lưu
document.getElementById('saveToDropboxBtn').addEventListener('click', () => {
    requestPassword(saveToDropbox);
});

    document.getElementById('refreshBtn').addEventListener('click', loadFromDropbox);
    renderTable();
	loadPatientsJson();
    setTimeout(() => loadFromDropbox().catch(e => console.warn), 300);
// Sửa lại sự kiện phím tắt (Ctrl+S)
document.addEventListener('keydown', async function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        requestPassword(saveToDropbox);
    }
});


document.addEventListener('keydown', function(e) {
    if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
        e.preventDefault(); // Ngăn trình duyệt tải lại toàn bộ trang
        loadFromDropbox();   // Chỉ gọi hàm tải dữ liệu của bạn
    }
});

function formatDate(dateStr) {
    if (!dateStr) return "";
    const [year, month, day] = dateStr.split('-');
    return `${day}/${month}/${year}`;
}
