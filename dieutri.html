<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chauhuynh0104 - Kiểm tra tờ điều trị</title>
<style>
:root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-soft: #dbeafe;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --success: #16a34a;
    --success-soft: #dcfce7;
    --border: #e5e7eb;
    --text: #0f172a;
    --muted: #64748b;
    --table-border: #93c5fd;
    --table-header: #dbeafe;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #f8fafc, #eef2ff);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
}

.container {
    width: 100%;
    max-width: 920px;
    background: var(--card);
    border-radius: 18px;
    padding: 28px 34px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
}

h1 {
    margin-top: 0;
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    color: var(--primary);
}

.upload-box {
    margin: 26px 0;
    border: 2px dashed #c7d2fe;
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    background: #f8fafc;
    transition: all 0.25s ease;
}

.upload-box:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
}

input[type="file"] {
    display: none;
}

.upload-label {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #ffffff;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 10px 22px rgba(37,99,235,0.25);
}

.upload-label:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(37,99,235,0.35);
}

#fileName {
    margin-top: 14px;
    font-size: 14px;
    color: var(--muted);
}

h2 {
    margin-top: 30px;
    font-size: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
}

.ok {
    color: var(--success);
    background: var(--success-soft);
    border-left: 5px solid var(--success);
    padding: 12px 16px;
    border-radius: 12px;
    margin: 12px 0;
    font-weight: 600;
    font-size: 15px;
}

/* Bảng chung (lỗi + báo thuốc) */
.common-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 15px;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
	border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.common-table th {
   padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
            word-break: break-word;
            max-width: 200px;
			background: #f2f2f2;
            position: sticky;
            top: 0;
			 background: linear-gradient(90deg, #3498db, #2980b9) !important;
  color: #fff !important;
  font-weight: bold;
  
  
}
 .hang {
        background-color: #e0f7fa;
    }
tr:hover td {
  background: rgba(0,0,0,0.03);
}
.common-table td {
    padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
            word-break: break-word;
            max-width: 200px;
			transition: background 0.2s ease-in-out;
			
}

.common-table tr:last-child td {
    border-bottom: none;
}

.common-table tr:nth-child(even) {
    background: #f0f9ff;
}

td hr {
    border: none;
    height: 1px;
    background: #ddd;        /* màu giống viền bảng */
    margin: 12px 0;
}

.common-table .date-col {
    font-weight: 600;
    white-space: nowrap;
    width: 180px;
}
/* Cải thiện bảng lỗi - thoáng hơn, cao hàng gấp đôi */
.error-msg-item {
    margin-bottom: 12px;
    line-height: 1.6;
    padding: 8px 0;
}

.error-msg-divider {
    height: 1px;
    background: #ddd;
    margin: 14px 0;
}

/* Tăng chiều cao hàng bảng chung cho đẹp */
.common-table td {
    padding: 20px 12px !important;  /* Tăng padding dọc → hàng cao hơn */
    vertical-align: top;
}

.common-table th {
    padding: 16px 12px !important;
}

/* Đảm bảo hàng xen kẽ vẫn nổi bật nhẹ */
.hang {
    background-color: #f8fbff;
    transition: background 0.2s ease;
}

.hang:hover {
    background-color: #eef4ff !important;
}
#result h3 {
    margin-top: 28px;
    color: var(--primary);
}
.footer {
    margin-top: 60px;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    padding: 25px 0;
    border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="container">


<div class="upload-box">
    <label for="fileInput" class="upload-label">
        📂 Chọn file HTML để kiểm tra
    </label>
    <input type="file" id="fileInput" accept=".html">
    <div id="fileName"></div>
</div>
<div id="result"></div>

<div class="footer">
        Design By <strong>Dr.Châu</strong>
    </div>
</div>

<script>
// Hàm định dạng ngày + thứ
function formatDateWithDay(dateStr) {
    const [dd, mm, yyyy] = dateStr.split("/").map(Number);
    const date = new Date(yyyy, mm - 1, dd);
    const days = ["Chủ nhật", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"];
    const dayName = days[date.getDay()];
    return `${dayName} - ${dateStr}`;
}

function hasText(content, text) {
    return content.toLowerCase().includes(text.toLowerCase());
}

function dateToNumber(d) {
    const [dd, mm, yyyy] = d.split("/");
    return new Date(yyyy, mm - 1, dd).getTime();
}

function getDateRange(start, end) {
    const dates = [];
    let cur = new Date(start.split("/").reverse().join("-"));
    const last = new Date(end.split("/").reverse().join("-"));

    while (cur <= last) {
        const dd = String(cur.getDate()).padStart(2, "0");
        const mm = String(cur.getMonth() + 1).padStart(2, "0");
        const yyyy = cur.getFullYear();
        dates.push(`${dd}/${mm}/${yyyy}`);
        cur.setDate(cur.getDate() + 1);
    }
    return dates;
}

function runCheck() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("Chưa chọn file HTML");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const html = e.target.result;
        processHTML(html);
    };
    reader.readAsText(file);
}





function processHTML(html) {
const patient = getPatientInfo(html);
    const rawErrors = [];
    const days = [];

// ==== Info bệnh nhân ======

function getPatientInfo(html) {
    const info = {
        name: "",
        age: "",
        gender: ""
    };

    // Họ tên người bệnh
    const nameRegex =
        /Họ&nbsp;t&#234;n&nbsp;người&nbsp;bệnh:<\/nobr>\s*<\/td>[\s\S]*?<nobr>(.*?)<\/nobr>/i;
    const nameMatch = html.match(nameRegex);
    if (nameMatch) info.name = nameMatch[1];

    // Tuổi
    const ageRegex =
        /Tuổi:<\/nobr>\s*<\/td>[\s\S]*?<nobr>(.*?)<\/nobr>/i;
    const ageMatch = html.match(ageRegex);
    if (ageMatch) info.age = ageMatch[1];

    // Giới tính
    const genderRegex =
        /Giới&nbsp;t&#237;nh:<\/nobr>\s*<\/td>[\s\S]*?<nobr>(.*?)<\/nobr>/i;
    const genderMatch = html.match(genderRegex);
    if (genderMatch) info.gender = genderMatch[1];

    return info;
}



    // ===== 1. Tách ngày =====
    const dayRegex = /<td\b[^>]*>\s*<nobr>\d{2}\/\d{2}\/\d{4}<\/nobr>[\s\S]*?<\/td>/gi;
    const matches = html.match(dayRegex) || [];
    for (let i = 0; i < matches.length; i++) {
        const start = html.indexOf(matches[i]);
        const end = (i < matches.length - 1) ? html.indexOf(matches[i + 1]) : html.length;
        const block = html.substring(start, end);

        const dateMatch = matches[i].match(/<nobr>(\d{2}\/\d{2}\/\d{4})<\/nobr>/);
        const date = dateMatch ? dateMatch[1] : "Không xác định";

        days.push({ date, content: block });
    }

    const validDays = days.filter(d => !d.content.includes("Phạm&nbsp;Khắc&nbsp;Kim&nbsp;Th&#224;nh"));

// ===== MỚI: KIỂM TRA CỒN XOA BÓP JAMDA =====
    const hasBackPain = hasText(html, "Đau cột sống thắt lưng (M54.5)");
    const hasJamda = hasText(html, "Jamda");

    if (hasBackPain && !hasJamda) {
        // Nếu muốn hiện thông báo riêng biệt ở đầu kết quả:
        rawErrors.push({
            date: "", 
            msg: `<span style="color: #e11d48">⚠️ <b>Bệnh nhân này không thấy Cồn xoa bóp Jamda trên tờ điều trị</b></span>`
        });
    }

    // ===== 2. Thủ thuật =====
    const techniques = [
        { key: "[kim ngắn]", label: "Điện châm [kim ngắn]" },
        { key: "bấm huyệt bằng tay", label: "Xoa bóp bấm huyệt bằng tay" },
        { key: "Điều trị bằng tia hồng ngoại", label: "Điều trị bằng tia hồng ngoại" },
        { key: "Kỹ thuật xoa", label: "Kỹ thuật xoa bóp vùng" }
    ];

    techniques.forEach(t => {
        let mustHave = false;
        validDays.forEach(d => {
if (
    hasText(d.content, "Thứ bảy") || 
    hasText(d.content, "Thứ 7") || 
    hasText(d.content, "Chủ nhật") || 
	    hasText(d.content, "Nghỉ lễ") || 
    hasText(d.content, "Nghỉ b&ugrave; lễ")
) return;
            if (d.content.includes(t.key)) mustHave = true;
            if (mustHave && !d.content.includes(t.key)) {
                rawErrors.push({
                    date: d.date,
                    msg: `Thiếu thủ thuật: <font color="red"><b>${t.label}</b></font>`
                });
            }
        });
    });

    // ===== 3. Vị thuốc + Sắc thuốc =====
    const vtBlockRegex = /Vị thuốc y học cổ truyền[\s\S]*?(x\s*\d+\s*thang)/g;
    let vtMatch;
    while ((vtMatch = vtBlockRegex.exec(html)) !== null) {
        const block = vtMatch[0];
        const dateMatch = block.match(/ng&agrave;y (\d{2}\/\d{2}\/\d{4}) đến ng&agrave;y (\d{2}\/\d{2}\/\d{4})/);
        if (!dateMatch) continue;

        const start = dateMatch[1];
        const end = dateMatch[2];

        const [dd1, mm1, yyyy1] = start.split("/").map(Number);
        const [dd2, mm2, yyyy2] = end.split("/").map(Number);
        const startDate = new Date(yyyy1, mm1 - 1, dd1);
        const endDate = new Date(yyyy2, mm2 - 1, dd2);
        const realDays = Math.floor((endDate - startDate) / (1000*60*60*24)) + 1;

        const thangMatch = block.match(/x\s*(\d+)\s*thang/);
        const declaredThang = thangMatch ? parseInt(thangMatch[1]) : null;

        if (declaredThang !== realDays) {
            rawErrors.push({
                date: start,
                msg: `Sai số thang thuốc (${start} → ${end}): ghi <font color="red"><b>x ${declaredThang}</b></font> thang, đúng phải là <font color="red"><b>x ${realDays}</b></font> thang`
            });
        }

        const daysInRange = validDays.filter(
            d => dateToNumber(d.date) >= dateToNumber(start) && dateToNumber(d.date) <= dateToNumber(end)
        );

        daysInRange.forEach(d => {
            if (!d.content.includes("Sắc thuốc thang")) {
                rawErrors.push({
                    date: d.date,
                    msg: `Thiếu thủ thuật <font color="red"><b>Sắc thuốc thang</b></font>`
                });
            } else {
                const startRegex = new RegExp(start.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*,');
                if (!startRegex.test(d.content)) {
                    rawErrors.push({
                        date: d.date,
                        msg: `Thủ thuật <font color="red"><b>Sắc thuốc thang</b></font> không đúng ngày bắt đầu (${formatDateWithDay(start)})`
                    });
                }
            }
        });
    }

/*  
  // ===== 4. Thuốc viên =====
    const pills = ["Amlodipine 5 mg Cap"];
    pills.forEach(p => {
        let must = false;
        validDays.forEach(d => {
            if (d.content.includes(p)) must = true;
            if (must && !d.content.includes(p)) {
                rawErrors.push({
                    date: d.date,
                    msg: `Thiếu thuốc: ${p}`
                });
            }
        });
    });
*/

    // ===== 5. Thuốc tiêm =====
    validDays.forEach(d => {
        if (d.content.includes("Dubemin injection") && !d.content.includes("Thủy ch&acirc;m:")) {
            rawErrors.push({
                date: d.date,
                msg: `Có <font color="red"><b>Dubemin injection</b></font> nhưng thiếu thủ thuật <font color="red"><b>Thủy ch&acirc;m</b></font>`
            });
        }
    });

    // ===== 6. Cận lâm sàng =====
    for (let i = 0; i < validDays.length - 1; i++) {
        const d = validDays[i];
        if (d.content.includes("đếm tổng trở") || d.content.includes("Chẩn đo&aacute;n h&igrave;nh ảnh:")) {
            let j = i + 1;
            while (j < validDays.length && (hasText(validDays[j].content, "Thứ bảy") || hasText(validDays[j].content, "Chủ nhật"))) {
                j++;
            }
            if (j < validDays.length && !validDays[j].content.includes("Kết quả CLS")) {
                rawErrors.push({
                    date: validDays[j].date,
                    msg: `Thiếu <font color="red"><b>Kết quả CLS</b></font>`
                });
            }
        }
    }

   // ===== 7. Báo thuốc đã dùng (theo yêu cầu mới) =====
    // Các thuốc chỉ hiển thị ngày đầu - ngày cuối + kiểm tra thiếu
    const rangeDisplayItems = ["Amlodipine 5 mg Cap", "Mimosa", "Kamelox 15", "Giác hơi", "Khang Minh thanh huyết", "Agilosart", "Magnesi-B6", "Tadimax", "Cồn xoa b&oacute;p Jamda","Reumokam"];
    // Thuốc liệt kê từng ngày, không kiểm tra thiếu
    const listEachDayItems = ["Dubemin injection"];

    const allTrackedItems = [...rangeDisplayItems, ...listEachDayItems];
    const used = {};
    allTrackedItems.forEach(t => used[t] = []);

    validDays.forEach(d => {
        allTrackedItems.forEach(t => {
            if (d.content.includes(t)) used[t].push(d.date);
        });
    });
let patientInfoHTML = `
<div style="
    margin: 20px 0;
    padding: 16px 20px;
    background: #eef2ff;
    border-left: 6px solid #2563eb;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
">
    <strong>👤 THÔNG TIN NGƯỜI BỆNH</strong><br>
    Họ tên: <strong>${patient.name || "Không xác định"}</strong><br>
    Tuổi: <strong>${patient.age || "Không xác định"}</strong><br>
    Giới tính: <strong>${patient.gender || "Không xác định"}</strong>
</div>
`;
    let reportTable = `
    <table class="common-table">
        <thead>
            <tr>
                <th style="width:240px;">Tên</th>
                <th style="width:300px;">Ngày đã dùng</th>
                <th>Thiếu ngày</th>
            </tr>
        </thead>
        <tbody>`;

   allTrackedItems.filter(t => used[t].length > 0).forEach(t => {
        let datesHTML = "";
        let missingHTML = "";

        if (listEachDayItems.includes(t)) {
            // Dubemin: liệt kê từng ngày
            datesHTML = used[t].map(d => formatDateWithDay(d)).join("<hr>");
        } else {
            // Các thuốc còn lại: hiển thị ngày đầu - ngày cuối
            const start = used[t][0];
            const end = used[t][used[t].length - 1];
            datesHTML = `${formatDateWithDay(start)}<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;⭣<br>${formatDateWithDay(end)}`;

            // Kiểm tra thiếu ngày trong khoảng
            const fullRange = getDateRange(start, end);
            const missing = fullRange.filter(d => !used[t].includes(d));
            
            if (missing.length > 0) {
                missingHTML = `<span style="color:#dc2626">${missing.map(d => formatDateWithDay(d)).join("<br> ")}</span>`;
            } else {
                missingHTML = `<span style="color:#16a34a"><b>Đã lên thuốc đủ</b></span>`;
            }

            // === LOGIC RIÊNG CHO REUMOKAM ===
            if (t === "Reumokam" && used[t].length < 3) {
                missingHTML = `<span style="color:#dc2626">⚠️ Chỉ mới lên <b>${used[t].length}</b> ngày</span>`;
            }
        }

        reportTable += `
        <tr class="hang">
            <td><strong>${t}</strong></td>
            <td>${datesHTML}</td>
            <td>${missingHTML}</td>
        </tr>`;
    });
    reportTable += `</tbody></table>`;

    // ===== HIỂN THỊ KẾT QUẢ =====
    const out = document.getElementById("result");
    out.innerHTML = patientInfoHTML + reportTable;


    if (rawErrors.length === 0) {
        out.innerHTML += `<div class="ok">Không phát hiện lỗi</div>`;
        return;
    }

    // Gộp lỗi theo ngày
    const errorsByDate = {};
    rawErrors.forEach(err => {
        if (!errorsByDate[err.date]) errorsByDate[err.date] = [];
        errorsByDate[err.date].push(err.msg);
    });

    // Sắp xếp theo ngày
    const sortedDates = Object.keys(errorsByDate).sort((a, b) => dateToNumber(a) - dateToNumber(b));

    // Tạo bảng lỗi
// Tạo bảng lỗi - CĂN GIỮA NGÀY THEO CHIỀU DỌC, ĐẸP HƠN
let errorTableHTML = `
    <table class="common-table" style="margin-top: 40px;">
        <thead>
            <tr>
                <th style="width: 200px;">Ngày</th>
                <th>Nội dung lỗi</th>
            </tr>
        </thead>
        <tbody>`;

    sortedDates.forEach(date => {
               const result = formatDateWithDay(date);
	   const formattedDate = result.replace("undefined -", "Cảnh báo");
        
        // Danh sách lỗi, mỗi lỗi một div riêng, khoảng cách đẹp
        const messagesHTML = errorsByDate[date]
            .map(msg => `<div style="margin-bottom: 14px; line-height: 1.5;">${msg}</div>`)
            .join('<hr style="margin: 14px 0; border: none; height: 1px; background: #ddd;">');

        errorTableHTML += `
        <tr class="hang" style="vertical-align: middle;">
            <td class="date-col" style="padding: 24px 12px; font-weight: 600; text-align: left;">
                ${formattedDate}
            </td>
            <td style="padding: 24px 16px;">
                ${messagesHTML}
            </td>
        </tr>`;
    });

    errorTableHTML += `</tbody></table>`;
    out.innerHTML += errorTableHTML;
	
	// === TỰ ĐỘNG CUỘN XUỐNG KẾT QUẢ ===
   setTimeout(() => {
        const firstTable = out.querySelector(".common-table");
        if (firstTable) {
            firstTable.scrollIntoView({
                behavior: "smooth",
                block: "start"  // Đưa phần đầu bảng lên gần đỉnh màn hình
            });
        } else {
            // Nếu chỉ có dòng "Không phát hiện lỗi"
            out.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        }
    }, 100);  

	
}

document.getElementById("fileInput").addEventListener("change", function () {
    if (this.files.length) {
        document.getElementById("fileName").textContent = this.files[0].name;
        runCheck();
    }
});

document.addEventListener("keydown", function (e) {
    if (e.key === "F5") {
        e.preventDefault();   // chặn hành vi mặc định
        location.reload();    // reload lại app
    }
});
</script>

</body>
</html>
