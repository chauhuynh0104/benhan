<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gộp File PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="file"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gộp PDF</h2>
    
    <div class="group">
        <label>Chọn các file PDF (Giữ Ctrl để chọn nhiều file):</label>
        <input type="file" id="fileInput" accept="application/pdf" multiple>
    </div>

    <div class="group">
        <label>Tên file sau khi gộp:</label>
        <input type="text" id="fileName" placeholder="Gop_File_Moi" value="Phiếu thực hiện kỹ thuật phục hồi chức năng">
    </div>

    <button id="mergeBtn">Bắt đầu gộp và Lưu</button>

    <div id="status"></div>
</div>

<script>
    const { PDFDocument } = PDFLib;

    document.getElementById('mergeBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const fileNameInput = document.getElementById('fileName');
        const status = document.getElementById('status');
        const files = fileInput.files;

        if (files.length < 2) {
            alert('Vui lòng chọn ít nhất 2 file để gộp!');
            return;
        }

        status.innerText = "Đang xử lý... vui lòng đợi.";
        document.getElementById('mergeBtn').disabled = true;

        try {
            const mergedPdf = await PDFDocument.create();

            for (const file of files) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }

            const pdfBytes = await mergedPdf.save();
            const fileName = fileNameInput.value.trim() || 'Combined_Document';

            // Sử dụng File System Access API để lưu (Nếu trình duyệt hỗ trợ)
            if ('showSaveFilePicker' in window) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: `${fileName}.pdf`,
                    types: [{
                        description: 'PDF Document',
                        accept: {'application/pdf': ['.pdf']},
                    }],
                });
                const writable = await handle.createWritable();
                await writable.write(pdfBytes);
                await writable.close();
                status.innerText = "✅ Đã gộp và lưu file thành công!";
            } else {
                // Cách fallback cũ cho các trình duyệt không hỗ trợ API mới
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${fileName}.pdf`;
                link.click();
                status.innerText = "✅ Đã gộp thành công! File đang được tải xuống.";
            }

        } catch (error) {
            console.error(error);
            status.innerText = "❌ Có lỗi xảy ra trong quá trình gộp file.";
        } finally {
            document.getElementById('mergeBtn').disabled = false;
        }
    });
</script>

</body>
</html>
