.duty-card {

        .duty-card {

 backdrop-filter: blur(5px);

            opacity: 0;

    // Lưu dữ liệu lên Dropbox
    async function saveToDropbox() {
        if (!dbx || !isDropboxReady) {
            showPopup("Đang khởi tạo dữ liệu, vui lòng thử lại sau vài giây.");
            return false;
        }
        const dataStr = JSON.stringify(allDuties, null, 2);
        try {
            // kiểm tra file tồn tại? dùng upload với mode overwrite
            await dbx.filesUpload({
                path: STORAGE_FILE,
                contents: dataStr,
                mode: { '.tag': 'overwrite' }
            });
            console.log("Đã lưu lên máy chủ thành công");
            return true;
        } catch(err) {
            console.error("Lỗi lưu dữ liệu:", err);
            showPopup("Lưu thất bại: " + (err.error_description || err.message));
            return false;
        }
    }

    // Đọc từ Dropbox
async function loadFromDropbox() {
    if (!dbx || !isDropboxReady) return false;
    try {
        const response = await dbx.filesDownload({ path: STORAGE_FILE });

        // ✅ SỬA CHUẨN Ở ĐÂY
        const blob = response.result.fileBlob;
        const text = await blob.text(); // đọc trực tiếp text

        const duties = JSON.parse(text);

        if (Array.isArray(duties)) {
            allDuties = duties;
        } else {
            allDuties = [];
        }

        console.log("Load OK:", allDuties);
        return true;

    } catch (err) {
        if (err.status === 409) {
            console.log("File chưa tồn tại");
            allDuties = [];
            return true;
        }

        console.error("Lỗi tải:", err);
        return false;
    }
}

                </button>

                <div class="card-body">
                    <div class="leader-info" style="margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #e0e8f0;">
                        <span style="font-weight: 700; color: #1f5e6e; font-size: 0.85rem;">

        `;
    }).join('');

    // ===== EVENT XOÁ =====
    document.querySelectorAll('.btn-delete').forEach(btn => {

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Xử lý submit modal: thêm mới hoặc cập nhật
    async function onSubmitDuty(event) {
        event.preventDefault();
        const date = document.getElementById('dutyDate').value;
        if(!date) { showPopup("Vui lòng chọn ngày trực"); return; }
        const leader = document.getElementById('leaderSelect').value;
        if(!leader) { showPopup("Chọn lãnh đạo trực"); return; }
        const khoaYs = getSelectedKhoaYs();
        // kiểm tra 6 khoa có đủ chọn không? (không bắt buộc tất cả nhưng yêu cầu tất cả các khoa đều phải có giá trị theo yêu cầu "nhập hết 6 khoa" nên báo nếu thiếu)
        let missing = [];
        for(let k of khoaNames) {
            if(!khoaYs[k]) missing.push(k);
        }
        if(missing.length) {
            showPopup(`Vui lòng chọn y sĩ cho các khoa: ${missing.join(', ')}`);
            return;
        }
        const noiDung = document.getElementById('noiDung').value;
        const chuThich = document.getElementById('chuThich').value;
        
        if(window.currentEditId) {
            // edit
            const index = allDuties.findIndex(d => d.id === window.currentEditId);
            if(index !== -1) {
                allDuties[index] = { ...allDuties[index], date, leader, khoaYs, noiDung, chuThich, updatedAt: new Date().toISOString() };
            } else {
                showPopup("Không tìm thấy bản ghi");
                closeModal(); return;
            }
        } else {
            // thêm mới - tạo id
            const newId = Date.now().toString() + '-' + Math.random().toString(36);
            const newDuty = {
                id: newId,
                date, leader, khoaYs, noiDung, chuThich,
                createdAt: new Date().toISOString()
            };
            allDuties.push(newDuty);
        }
        const success = await saveToDropbox();
        if(success) {
            await loadFromDropbox(); // refresh allDuties
            renderDuties();
            closeModal();
        } else {
            showPopup("Lưu lên Dropbox thất bại, kiểm tra token hoặc mạng.");
        }
    }

    // Khởi tạo Dropbox với refresh token flow (dùng access token từ refresh token)
    async function initDropbox() {
        // Sử dụng refresh token để lấy access token mới. Để đơn giản ta dùng OAuth2 client credentials? Dropbox SDK hỗ trợ token tự động.
        // Cách an toàn: tạo access token từ refresh token qua API.
        try {
            const response = await fetch('https://api.dropbox.com/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `grant_type=refresh_token&refresh_token=${REFRESH_KEY}&client_id=${APP_KEY}&client_secret=${APP_SECRET}`
            });
            const data = await response.json();
            if(data.access_token) {
                dbx = new Dropbox.Dropbox({ accessToken: data.access_token });
                isDropboxReady = true;
                console.log("Dropbox ready");
                await loadFromDropbox();
                renderDuties();
            } else {
                throw new Error("Không lấy được access token");
            }
        } catch(err) {
            console.error("Dropbox auth error:", err);
            document.getElementById('calendarContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Lỗi kết nối với máy chủ: vui lòng kiểm tra lại token.<br> Dùng chế độ offline giả lập? Thử f5 lại.</div>`;
            isDropboxReady = false;
        }
    }
