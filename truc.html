    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f7f3;
            color: #1e2a3e;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header & search */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e6f3f, #2b8c5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #4a627a;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .search-wrapper {
            max-width: 650px;
            margin: 1.8rem auto 0;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8aa2b9;
            font-size: 1.2rem;
        }

        #searchInput {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            font-size: 1rem;
            border: 1px solid #cbdbe2;
            border-radius: 60px;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        #searchInput:focus {
            outline: none;
            border-color: #2b8c5e;
            box-shadow: 0 6px 14px rgba(43, 140, 94, 0.15);
        }

        .stats {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5b7a9a;
            text-align: center;
        }

        /* Card grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        /* Card design */
        .contact-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.08);
            transition: all 0.25s ease;
            overflow: hidden;
            border: 1px solid #e6edf0;
            display: flex;
            flex-direction: column;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbe4d9;
        }

        .card-header {
            background: linear-gradient(105deg, #f9fefb 0%, #f1f9f4 100%);
            padding: 1.2rem 1.5rem 0.8rem 1.5rem;
            border-bottom: 2px solid #dff0e8;
        }

        .name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a4d2e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .name i {
            color: #2b8c5e;
            font-size: 1.2rem;
        }

        .badge {
            background: #eef3ec;
            color: #2a6e47;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        .card-body {
            padding: 1rem 1.5rem 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #2c3f4f;
        }

        .info-row i {
            width: 1.3rem;
            margin-top: 0.1rem;
            color: #4d8b6b;
            font-size: 0.9rem;
        }

        .info-row .label {
            font-weight: 600;
            min-width: 85px;
            color: #59748f;
        }

        .info-row .value {
            flex: 1;
            word-break: break-word;
            color: #1f2f3e;
        }

        .phone-link, .email-link {
            text-decoration: none;
            font-weight: 500;
            transition: 0.15s;
        }

        .phone-link {
            color: #1f6e43;
            background: #e9f5ef;
            padding: 0.15rem 0.5rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .phone-link:hover {
            background: #cbe8dd;
            color: #0b462c;
        }

        .email-link {
            color: #2c6e9e;
            word-break: break-all;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .department {
            background: #f4f9fc;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            color: #2c6b4c;
        }

        .card-footer {
            background: #fafefc;
            padding: 0.9rem 1.5rem;
            border-top: 1px solid #e4efe9;
            font-size: 0.75rem;
            color: #6c8da3;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 2rem;
            color: #6782a0;
            font-weight: 500;
            grid-column: 1 / -1;
        }

        @media (max-width: 760px) {
            body {
                padding: 1rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .info-row .label {
                min-width: 70px;
            }
        }
    </style>
</head>

    function renderCards(filterText = '') {

        let filtered = employees;
        if (lowerFilter !== '') {
            filtered = employees.filter(emp =>

    </span>
</div>

    <span class="label">Số GPHN:</span>

</div>

<div class="info-row">
    <i class="fas fa-calendar-check"></i>

</div>
<div class="info-row">

</div>  



              </div>
                <div class="card-footer">
                    <i class="fas fa-stethoscope"></i> Khoa: ${escapeHtml(emp.khoaPhong)} &nbsp;|&nbsp; <i class="fas fa-id-badge"></i> STT: ${emp.stt}
                </div>
            </div>
        `).join('');
        container.innerHTML = html;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    searchInput.addEventListener('input', (e) => renderCards(e.target.value));
    renderCards();
</script>
